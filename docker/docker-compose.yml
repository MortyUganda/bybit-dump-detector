version: "3.9"

services:
  # ─── Infrastructure ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: dd_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dumpdetector}
      POSTGRES_USER: ${POSTGRES_USER:-dumpuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-strongpassword123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dumpuser} -d ${POSTGRES_DB:-dumpdetector}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dd_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── App Services ────────────────────────────────────────────
  ingestion:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: dd_ingestion
    restart: unless-stopped
    command: python -m app.main ingestion
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../logs:/app/logs
    environment:
      SERVICE_NAME: ingestion

  analyzer:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: dd_analyzer
    restart: unless-stopped
    command: python -m app.main analyzer
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../logs:/app/logs
    environment:
      SERVICE_NAME: analyzer

  bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: dd_bot
    restart: unless-stopped
    command: python -m app.main bot
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../logs:/app/logs
    environment:
      SERVICE_NAME: bot

  # ─── Migration runner (runs once then exits) ─────────────────
  migrate:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: dd_migrate
    restart: "no"
    command: python -m app.db.migrations.run_migrations
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
